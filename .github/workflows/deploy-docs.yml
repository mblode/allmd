name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy docs
        run: npx blodemd push docs
        env:
          BLODEMD_API_KEY: ${{ secrets.BLODEMD_API_KEY }}
